specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: LaunchpadFactory
    network: robinhood-mainnet
    source:
      address: "0x68a983f0c73f1a5dc13aa3ae71a19a5787162cdb"
      abi: LaunchpadFactory
      startBlock: 16758000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Protocol
      abis:
        - name: LaunchpadFactory
          file: LaunchpadFactory\LaunchpadFactory.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,indexed address,string,string,string)
          handler: handleTokenCreated
      file: LaunchpadFactory\LaunchpadFactory.wasm
  - kind: ethereum
    name: BuybackTreasury
    network: robinhood-mainnet
    source:
      address: "0x232cf3b0026ed39e1448567e8da55206375945e4"
      abi: BuybackTreasury
      startBlock: 16758000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TreasuryOp
        - Protocol
      abis:
        - name: BuybackTreasury
          file: BuybackTreasury\BuybackTreasury.json
      eventHandlers:
        - event: Received(indexed address,uint256)
          handler: handleReceived
        - event: Buyback(indexed address,indexed address,uint256,uint256)
          handler: handleBuyback
        - event: Burned(indexed address,uint256)
          handler: handleBurned
      file: BuybackTreasury\BuybackTreasury.wasm
templates:
  - kind: ethereum
    name: BondingCurvePool
    network: robinhood-mainnet
    source:
      abi: BondingCurvePool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Trade
        - Protocol
      abis:
        - name: BondingCurvePool
          file: BondingCurvePool\BondingCurvePool.json
      eventHandlers:
        - event: Buy(indexed address,uint256,uint256,uint256)
          handler: handleBuy
        - event: Sell(indexed address,uint256,uint256,uint256)
          handler: handleSell
        - event: Graduated(uint256,uint256)
          handler: handleGraduated
      file: templates\BondingCurvePool\BondingCurvePool.wasm
