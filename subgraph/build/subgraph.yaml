specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: LaunchpadFactory
    network: robinhood-mainnet
    source:
      address: "0xb09683cdd8e1dae93e37163eb4e6dd925d4104f9"
      abi: LaunchpadFactory
      startBlock: 14077084
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Protocol
      abis:
        - name: LaunchpadFactory
          file: LaunchpadFactory/LaunchpadFactory.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,indexed address,string,string,string)
          handler: handleTokenCreated
      file: LaunchpadFactory/LaunchpadFactory.wasm
  - kind: ethereum
    name: BuybackTreasury
    network: robinhood-mainnet
    source:
      address: "0xe5544c837f8dfd6b7e082435f7a1d646692239d3"
      abi: BuybackTreasury
      startBlock: 14077084
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TreasuryOp
        - Protocol
      abis:
        - name: BuybackTreasury
          file: BuybackTreasury/BuybackTreasury.json
      eventHandlers:
        - event: Received(indexed address,uint256)
          handler: handleReceived
        - event: Buyback(indexed address,indexed address,uint256,uint256)
          handler: handleBuyback
        - event: Burned(indexed address,uint256)
          handler: handleBurned
      file: BuybackTreasury/BuybackTreasury.wasm
  - kind: ethereum
    name: BuybackVote
    network: robinhood-mainnet
    source:
      address: "0xf663b704929b8c0562f6e1ae5c0387ad264d4ef3"
      abi: BuybackVote
      startBlock: 14077084
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VoteCast
      abis:
        - name: BuybackVote
          file: BuybackVote/BuybackVote.json
      eventHandlers:
        - event: Vote(indexed address,indexed address,indexed uint256)
          handler: handleVote
      file: BuybackVote/BuybackVote.wasm
templates:
  - kind: ethereum
    name: BondingCurvePool
    network: robinhood-mainnet
    source:
      abi: BondingCurvePool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Trade
        - Protocol
      abis:
        - name: BondingCurvePool
          file: BondingCurvePool/BondingCurvePool.json
      eventHandlers:
        - event: Buy(indexed address,uint256,uint256,uint256)
          handler: handleBuy
        - event: Sell(indexed address,uint256,uint256,uint256)
          handler: handleSell
        - event: Graduated(uint256,uint256)
          handler: handleGraduated
      file: templates/BondingCurvePool/BondingCurvePool.wasm
