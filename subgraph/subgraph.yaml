specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # --- hood v2 (мейннет, задеплоено 22.07.2026) ---
  # События v2 идентичны v1 (TokenCreated / Buy / Sell / Received / Buyback /
  # Burned), поэтому ABI и мэппинги те же — меняются только адреса и блок.
  # Голосование v2 (VotePower) фронт читает напрямую по RPC — в сабграфе не нужно.
  - kind: ethereum
    name: LaunchpadFactory
    network: robinhood-mainnet
    source:
      address: "0x68a983f0c73f1a5dc13aa3ae71a19a5787162cdb"
      abi: LaunchpadFactory
      startBlock: 16758000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [Token, Protocol]
      abis:
        - name: LaunchpadFactory
          file: ./abis/LaunchpadFactory.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address,indexed address,string,string,string)
          handler: handleTokenCreated
      file: ./src/factory.ts
  - kind: ethereum
    name: BuybackTreasury
    network: robinhood-mainnet
    source:
      address: "0x232cf3b0026ed39e1448567e8da55206375945e4"
      abi: BuybackTreasury
      startBlock: 16758000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [TreasuryOp, Protocol]
      abis:
        - name: BuybackTreasury
          file: ./abis/BuybackTreasury.json
      eventHandlers:
        - event: Received(indexed address,uint256)
          handler: handleReceived
        - event: Buyback(indexed address,indexed address,uint256,uint256)
          handler: handleBuyback
        - event: Burned(indexed address,uint256)
          handler: handleBurned
      file: ./src/treasury.ts
templates:
  - kind: ethereum
    name: BondingCurvePool
    network: robinhood-mainnet
    source:
      abi: BondingCurvePool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities: [Token, Trade, Protocol]
      abis:
        - name: BondingCurvePool
          file: ./abis/BondingCurvePool.json
      eventHandlers:
        - event: Buy(indexed address,uint256,uint256,uint256)
          handler: handleBuy
        - event: Sell(indexed address,uint256,uint256,uint256)
          handler: handleSell
        - event: Graduated(uint256,uint256)
          handler: handleGraduated
      file: ./src/pool.ts
