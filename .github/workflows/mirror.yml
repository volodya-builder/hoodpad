name: pons-mirror
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: pons-mirror
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: bot
        run: npm install --no-audit --no-fund

      - name: Run mirror (one pass)
        working-directory: bot
        env:
          MIRROR_PRIVATE_KEY: ${{ secrets.MIRROR_PRIVATE_KEY }}
        run: node mirror.js once

      - name: Save state
        run: |
          git config user.name "mirror-bot"
          git config user.email "bot@hoodandarrow.com"
          git add bot/state.json || true
          git diff --cached --quiet || git commit -m "bot: state update [skip ci]"
          git push
