name: Deploy site

# Собирает web/ и публикует в ветку gh-pages силами самого GitHub.
# Токен не нужен: используется встроенный secrets.GITHUB_TOKEN,
# всё выполняется на серверах GitHub. Триггерится любым изменением
# в web/ на ветке main, либо вручную кнопкой "Run workflow".

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        working-directory: web
        run: |
          npm install
          npx vite build
          echo "hoodandarrow.com" > dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          publish_branch: gh-pages
    
