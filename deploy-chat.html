<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hood — деплой ончейн-чата</title>
<style>
:root { --bg:#0d0e0c; --card:#161715; --border:#282923; --text:#f1f2ed; --dim:#9b9e94;
        --acc:#b9c94b; --red:#e05c5c; font-family:"Manrope",-apple-system,sans-serif; }
* { box-sizing:border-box }
body { margin:0; background:var(--bg); color:var(--text); min-height:100vh; padding:40px 20px; }
.wrap { max-width:640px; margin:0 auto; }
h1 { font-size:24px; margin:0 0 6px }
.dim { color:var(--dim); font-size:13.5px; line-height:1.6 }
.card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; margin-top:18px }
.btn { border:1px solid var(--border); background:#111210; color:var(--text); padding:12px 22px;
       border-radius:11px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit }
.btn-primary { background:linear-gradient(135deg,#c8d955,#aab83f); color:#15170a; border-color:transparent }
.btn:disabled { opacity:.4; cursor:not-allowed }
.mono { font-family:ui-monospace,monospace; font-size:12.5px; word-break:break-all }
a { color:var(--acc) }
.result { background:#111210; border:1px solid #3c3e2a; border-radius:12px; padding:16px; margin-top:14px; display:none }
</style>
</head>
<body>
<div class="wrap">
  <h1>Деплой ончейн-чата hood</h1>
  <p class="dim">Одна транзакция с вашего кошелька — и у каждого токена появится чат,
  живущий прямо в блокчейне: без серверов, писать может любой кошелёк, история вечная.</p>
  <div class="card">
    <button class="btn btn-primary" id="goBtn">Подключить и задеплоить (1 транзакция)</button>
    <div class="dim" id="status" style="margin-top:12px">Ожидание…</div>
  </div>
  <div class="result" id="result">
    <b style="color:var(--acc)">Чат в блокчейне ✓</b>
    <div class="dim" style="margin:8px 0 4px">Адрес контракта чата — пришлите его Клоду:</div>
    <div class="mono" id="addr"></div>
    <div style="margin-top:12px"><button class="btn" id="copyBtn">Скопировать</button></div>
  </div>
  <p class="dim" style="margin-top:14px">чат-деплоер v1 · без внешних зависимостей</p>
</div>
<script>
"use strict";
var BYTECODE = "0x6080604052348015600f57600080fd5b506101c98061001f6000396000f3fe608060405234801561001057600080fd5b506004361061002b5760003560e01c8063875a8dfc14610030575b600080fd5b61004361003e3660046100c7565b610045565b005b80801580610054575061011881115b1561007257604051635aed9cff60e01b815260040160405180910390fd5b336001600160a01b0316846001600160a01b03167fa7d889ca177c0e707480f7966dd00c922edee469e32a5971f0a317cf2e5cfb208585426040516100b99392919061015a565b60405180910390a350505050565b6000806000604084860312156100dc57600080fd5b83356001600160a01b03811681146100f357600080fd5b9250602084013567ffffffffffffffff81111561010f57600080fd5b8401601f8101861361012057600080fd5b803567ffffffffffffffff81111561013757600080fd5b86602082840101111561014957600080fd5b939660209190910195509293505050565b604081528260408201528284606083013760006060848301015260006060601f19601f860116830101905082602083015294935050505056fea26469706673582212208ffde35c7fba2eaaed7c8025b7bebf10d612e334901779437d98802dfcfd16ec64736f6c634300081c0033";
var CHAIN_HEX = "0xb626";
var discovered = [];
window.addEventListener("eip6963:announceProvider", function (e) { discovered.push(e.detail); });
window.dispatchEvent(new Event("eip6963:requestProvider"));
function pick() {
  var mm = discovered.find(function (d) { return d.info && /metamask/i.test(d.info.name); });
  if (mm) return mm.provider;
  if (discovered.length) return discovered[0].provider;
  if (window.ethereum && window.ethereum.providers) {
    var p = window.ethereum.providers.find(function (x) { return x.isMetaMask; });
    if (p) return p;
  }
  return window.ethereum || null;
}
function st(m) { document.getElementById("status").innerHTML = m; }
document.getElementById("goBtn").onclick = async function () {
  var btn = this; btn.disabled = true;
  try {
    var pr = pick();
    if (!pr) { st('<span style="color:var(--red)">Кошелёк не найден</span>'); btn.disabled = false; return; }
    st("Запрашиваю доступ к аккаунту…");
    var accs = await pr.request({ method: "eth_requestAccounts" });
    var acc = accs[0];
    var cur = await pr.request({ method: "eth_chainId" });
    if (cur !== CHAIN_HEX) {
      st("Переключаю сеть на Robinhood Chain Testnet…");
      await pr.request({ method: "wallet_switchEthereumChain", params: [{ chainId: CHAIN_HEX }] });
    }
    st("Отправляю деплой — подтвердите в MetaMask…");
    var hash = await pr.request({ method: "eth_sendTransaction", params: [{ from: acc, data: BYTECODE }] });
    st("Жду подтверждения " + hash.slice(0, 12) + "…");
    var r = null;
    for (var i = 0; i < 180 && !r; i++) {
      r = await pr.request({ method: "eth_getTransactionReceipt", params: [hash] });
      if (!r) await new Promise(function (res) { setTimeout(res, 1500); });
    }
    if (!r || r.status !== "0x1") throw new Error("Транзакция не подтвердилась");
    st('<b style="color:var(--acc)">Готово ✓</b>');
    document.getElementById("addr").textContent = r.contractAddress;
    document.getElementById("result").style.display = "block";
    document.getElementById("copyBtn").onclick = function () {
      navigator.clipboard.writeText("CHAT=" + r.contractAddress);
      this.textContent = "Скопировано ✓";
    };
  } catch (e) {
    st('<span style="color:var(--red)">Ошибка: ' + (e && e.message ? e.message : String(e)) + "</span>");
    btn.disabled = false;
  }
};
</script>
</body>
</html>
